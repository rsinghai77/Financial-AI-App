openspec: "1.0"
kind: MCPServers

metadata:
  name: finapp-mcp-servers
  version: "0.1.0"
  status: draft
  last_updated: "2026-03-15"
  notes: >
    All MCP servers use the stdio transport for local development.
    Each server runs as a subprocess managed by the application.
    In production, servers can be migrated to SSE transport independently.

mcp_protocol_version: "1.0"

global_config:
  transport: stdio
  error_format: json
  timeout_seconds: 30
  retry_attempts: 2
  retry_delay_seconds: 1

# =============================================================================
# MCP SERVER DEFINITIONS
# =============================================================================
servers:

  # ---------------------------------------------------------------------------
  - id: MCP-001
    name: market-data-mcp
    display_name: "Market Data Server"
    path: src/finapp/mcp_servers/market_data_server.py
    description: >
      Provides real-time and historical market data including quotes, prices,
      technical indicators, and fundamental data. Implements cache-aside pattern
      with fallback between data providers.

    external_providers:
      primary:
        name: Alpha Vantage
        api_key_env: ALPHA_VANTAGE_API_KEY
        base_url: https://www.alphavantage.co/query
        rate_limit: "5 requests/minute (free tier), 75/minute (premium)"
      fallback:
        name: Yahoo Finance (yfinance library)
        api_key_env: null  # No API key required
        notes: "Used when Alpha Vantage is rate-limited or unavailable"

    cache:
      backend: diskcache
      location: .cache/market_data
      ttls:
        quote: 300           # 5 minutes
        historical_daily: 3600   # 1 hour
        historical_intraday: 60  # 1 minute
        fundamentals: 86400      # 24 hours
        technical_indicators: 300  # 5 minutes

    tools:
      - name: get_quote
        description: Get current market quote for one or more ticker symbols
        parameters:
          tickers:
            type: array
            items: {type: string}
            description: List of ticker symbols (e.g., ["AAPL", "MSFT", "SPY"])
            max_items: 20
        returns:
          type: object
          properties:
            ticker: {type: string}
            price: {type: number, description: "Current price in USD"}
            change: {type: number, description: "Price change since previous close"}
            change_pct: {type: number, description: "Percentage change since previous close"}
            volume: {type: integer}
            market_cap: {type: number}
            high_52w: {type: number}
            low_52w: {type: number}
            data_timestamp: {type: string, format: datetime}
            is_cached: {type: boolean}
            cache_age_seconds: {type: integer}

      - name: get_historical_prices
        description: Get historical OHLCV data for a ticker
        parameters:
          ticker:
            type: string
            description: Single ticker symbol
          period:
            type: string
            enum: ["1d", "5d", "1mo", "3mo", "6mo", "ytd", "1y", "5y", "max"]
          interval:
            type: string
            enum: ["1m", "5m", "15m", "30m", "1h", "1d", "1wk", "1mo"]
            default: "1d"
        returns:
          type: array
          items:
            properties:
              date: {type: string, format: date}
              open: {type: number}
              high: {type: number}
              low: {type: number}
              close: {type: number}
              volume: {type: integer}
              adj_close: {type: number}

      - name: get_fundamentals
        description: Get fundamental financial data for a company
        parameters:
          ticker:
            type: string
        returns:
          type: object
          properties:
            pe_ratio: {type: number}
            pb_ratio: {type: number}
            ps_ratio: {type: number}
            ev_ebitda: {type: number}
            dividend_yield: {type: number}
            payout_ratio: {type: number}
            eps_ttm: {type: number}
            revenue_ttm: {type: number}
            net_income_ttm: {type: number}
            debt_to_equity: {type: number}
            return_on_equity: {type: number}
            profit_margin: {type: number}
            earnings_growth_yoy: {type: number}

      - name: get_technical_indicators
        description: Calculate technical analysis indicators for a ticker
        parameters:
          ticker:
            type: string
          indicators:
            type: array
            items:
              type: string
              enum: ["RSI", "MACD", "SMA_20", "SMA_50", "SMA_200", "EMA_12", "EMA_26",
                     "BOLLINGER_BANDS", "ATR", "OBV"]
          period:
            type: string
            enum: ["1mo", "3mo", "6mo", "1y"]
            default: "3mo"
        returns:
          type: object
          description: Dictionary of indicator_name to time-series values

    resources:
      - name: market_status
        description: Current market open/closed status with next open time
        uri: market://status

  # ---------------------------------------------------------------------------
  - id: MCP-002
    name: news-mcp
    display_name: "News & Sentiment Server"
    path: src/finapp/mcp_servers/news_server.py
    description: >
      Provides financial news, sentiment analysis, and SEC filing data.
      Caches articles to minimize API calls.

    external_providers:
      primary:
        name: NewsAPI
        api_key_env: NEWS_API_KEY
        base_url: https://newsapi.org/v2
        rate_limit: "100 requests/day (free tier)"
      supplemental:
        name: SEC EDGAR (public, no key required)
        base_url: https://efts.sec.gov/LATEST/search-index
      fallback:
        name: RSS feeds from major financial news outlets
        sources: ["Reuters", "Bloomberg (public)", "MarketWatch", "CNBC"]

    cache:
      backend: diskcache
      location: .cache/news
      ttls:
        articles: 1800    # 30 minutes
        sentiment: 3600   # 1 hour
        sec_filings: 86400  # 24 hours

    tools:
      - name: search_news
        description: Search for financial news articles by company or topic
        parameters:
          query:
            type: string
            description: Search query (company name, ticker, or topic)
          tickers:
            type: array
            items: {type: string}
            description: Optional list of tickers to filter news by
          from_date:
            type: string
            format: date
            description: Start date for news search (default: 7 days ago)
          max_articles:
            type: integer
            default: 10
            maximum: 50
        returns:
          type: array
          items:
            properties:
              title: {type: string}
              source: {type: string}
              url: {type: string}
              published_at: {type: string, format: datetime}
              description: {type: string}
              sentiment_score: {type: number, minimum: -1, maximum: 1}
              sentiment_label: {type: string, enum: ["positive", "neutral", "negative"]}
              relevant_tickers: {type: array, items: {type: string}}

      - name: get_sentiment_score
        description: Analyze sentiment of a text or aggregate news sentiment for a ticker
        parameters:
          text:
            type: string
            description: Text to analyze (optional — if not provided, uses recent news for ticker)
          ticker:
            type: string
            description: Ticker to aggregate news sentiment for (optional)
          lookback_days:
            type: integer
            default: 7
        returns:
          type: object
          properties:
            score: {type: number, minimum: -1, maximum: 1, description: "-1=very negative, 0=neutral, 1=very positive"}
            label: {type: string, enum: ["very_positive", "positive", "neutral", "negative", "very_negative"]}
            article_count: {type: integer}
            confidence: {type: number, minimum: 0, maximum: 1}

      - name: get_sec_filings
        description: Get recent SEC filings for a company
        parameters:
          ticker:
            type: string
          filing_types:
            type: array
            items:
              type: string
              enum: ["10-K", "10-Q", "8-K", "DEF 14A", "4", "S-1"]
            default: ["10-K", "10-Q", "8-K"]
          limit:
            type: integer
            default: 5
        returns:
          type: array
          items:
            properties:
              form_type: {type: string}
              filed_date: {type: string, format: date}
              description: {type: string}
              url: {type: string}

      - name: summarize_article
        description: Generate a concise summary of a news article given its URL
        parameters:
          url:
            type: string
            format: uri
        returns:
          type: object
          properties:
            summary: {type: string, description: "2-3 sentence summary of the article"}
            key_entities: {type: array, items: {type: string}}
            sentiment: {type: string, enum: ["positive", "neutral", "negative"]}

  # ---------------------------------------------------------------------------
  - id: MCP-003
    name: portfolio-mcp
    display_name: "Portfolio Data Server"
    path: src/finapp/mcp_servers/portfolio_server.py
    description: >
      Provides CRUD operations for portfolio data, holdings, transactions,
      and performance metrics. This is the primary data server for user
      financial data.

    data_store:
      type: sqlite_in_dev_postgresql_in_prod
      connection_env: DATABASE_URL
      default_dev: "sqlite:///./finapp.db"

    tools:
      - name: get_portfolio
        description: Get complete portfolio data including all holdings and current values
        parameters:
          account_id:
            type: string
            description: Specific account to retrieve (optional — returns all accounts if omitted)
          include_closed:
            type: boolean
            default: false
            description: Include positions that have been fully sold
        returns:
          type: object
          properties:
            accounts: {type: array}
            total_value: {type: number}
            total_cost_basis: {type: number}
            total_gain_loss: {type: number}
            total_gain_loss_pct: {type: number}
            as_of: {type: string, format: datetime}

      - name: add_holding
        description: Add a new holding to the portfolio
        parameters:
          ticker: {type: string}
          quantity: {type: number, minimum: 0}
          cost_basis_per_share: {type: number, minimum: 0}
          purchase_date: {type: string, format: date}
          account_id: {type: string}
          asset_class:
            type: string
            enum: ["equity", "etf", "mutual_fund", "bond", "crypto", "cash", "other"]
          notes: {type: string, nullable: true}
        returns:
          type: object
          properties:
            holding_id: {type: string}
            success: {type: boolean}

      - name: update_holding
        description: Update quantity or notes for an existing holding
        parameters:
          holding_id: {type: string}
          quantity: {type: number, nullable: true}
          notes: {type: string, nullable: true}
        returns:
          type: object
          properties:
            success: {type: boolean}

      - name: get_performance
        description: Calculate portfolio performance metrics for a given period
        parameters:
          period:
            type: string
            enum: ["1d", "1w", "1m", "3m", "6m", "ytd", "1y", "all"]
          account_id: {type: string, nullable: true}
          benchmark:
            type: string
            default: "SPY"
            description: Benchmark ticker to compare against
        returns:
          type: object
          properties:
            return_pct: {type: number}
            return_dollars: {type: number}
            benchmark_return_pct: {type: number}
            alpha: {type: number}
            max_drawdown: {type: number}
            volatility_annualized: {type: number}
            sharpe_ratio: {type: number}
            sortino_ratio: {type: number}

      - name: get_transactions
        description: Retrieve transaction history with filtering
        parameters:
          account_id: {type: string, nullable: true}
          ticker: {type: string, nullable: true}
          from_date: {type: string, format: date, nullable: true}
          to_date: {type: string, format: date, nullable: true}
          transaction_types:
            type: array
            items:
              type: string
              enum: ["buy", "sell", "dividend", "transfer_in", "transfer_out", "split"]
          limit: {type: integer, default: 100}
        returns:
          type: array
          items:
            properties:
              transaction_id: {type: string}
              date: {type: string, format: date}
              type: {type: string}
              ticker: {type: string}
              quantity: {type: number}
              price: {type: number}
              fees: {type: number}
              account_id: {type: string}
              notes: {type: string}

  # ---------------------------------------------------------------------------
  - id: MCP-004
    name: calculator-mcp
    display_name: "Financial Calculator Server"
    path: src/finapp/mcp_servers/calculator_server.py
    description: >
      Provides financial calculation tools. All calculations are stateless pure
      functions — no data is persisted. Uses numpy/scipy for quantitative methods.

    tools:
      - name: calculate_var
        description: Calculate Value at Risk for a portfolio using historical simulation
        parameters:
          portfolio_returns:
            type: array
            items: {type: number}
            description: Historical daily return series as decimals (e.g., 0.01 for 1%)
          confidence_level:
            type: number
            default: 0.95
            enum: [0.90, 0.95, 0.99]
          holding_period_days:
            type: integer
            default: 1
            enum: [1, 5, 10]
          portfolio_value:
            type: number
            description: Current portfolio value in USD
        returns:
          type: object
          properties:
            var_pct: {type: number, description: "VaR as percentage of portfolio"}
            var_dollars: {type: number, description: "VaR in USD"}
            confidence_level: {type: number}
            holding_period_days: {type: integer}
            method: {type: string, description: "Calculation method used"}

      - name: calculate_sharpe
        description: Calculate Sharpe and Sortino ratios for a return series
        parameters:
          returns:
            type: array
            items: {type: number}
            description: Daily return series
          risk_free_rate_annual:
            type: number
            default: 0.05
            description: Annual risk-free rate (e.g., 0.05 for 5%)
        returns:
          type: object
          properties:
            sharpe_ratio: {type: number}
            sortino_ratio: {type: number}
            annualized_return: {type: number}
            annualized_volatility: {type: number}
            max_drawdown: {type: number}

      - name: run_stress_test
        description: Simulate portfolio performance under historical crash scenarios
        parameters:
          holdings:
            type: array
            description: List of ticker/weight pairs
            items:
              properties:
                ticker: {type: string}
                weight: {type: number, description: "Portfolio weight 0-1"}
          scenario:
            type: string
            enum:
              - "2008_financial_crisis"      # Oct 2007 - Mar 2009: S&P -57%
              - "2020_covid_crash"           # Feb 2020 - Mar 2020: S&P -34%
              - "2022_rate_hike"             # Jan 2022 - Oct 2022: S&P -25%, Bonds -18%
              - "dot_com_bubble"             # Mar 2000 - Oct 2002: S&P -49%
              - "custom"
          custom_shock_pct:
            type: number
            nullable: true
            description: "Used when scenario=custom; e.g., -0.30 for 30% market drop"
          portfolio_value:
            type: number
        returns:
          type: object
          properties:
            scenario: {type: string}
            portfolio_loss_pct: {type: number}
            portfolio_loss_dollars: {type: number}
            worst_holding: {type: string}
            worst_holding_loss_pct: {type: number}
            estimated_recovery_years: {type: number}

      - name: calculate_irr
        description: Calculate Internal Rate of Return for a series of cash flows
        parameters:
          cash_flows:
            type: array
            items: {type: number}
            description: Cash flow series (negative=outflows, positive=inflows)
          dates:
            type: array
            items: {type: string, format: date}
        returns:
          type: object
          properties:
            irr_annual: {type: number}
            irr_monthly: {type: number}

      - name: optimize_weights
        description: Calculate optimal portfolio weights using mean-variance optimization
        parameters:
          tickers:
            type: array
            items: {type: string}
          optimization_target:
            type: string
            enum: ["max_sharpe", "min_volatility", "max_return_for_risk"]
          constraints:
            type: object
            properties:
              min_weight: {type: number, default: 0.0}
              max_weight: {type: number, default: 1.0}
              target_volatility: {type: number, nullable: true}
        returns:
          type: object
          properties:
            weights: {type: object, description: "ticker -> weight mapping"}
            expected_return: {type: number}
            expected_volatility: {type: number}
            sharpe_ratio: {type: number}

      - name: project_future_value
        description: Project future value of an investment with contributions
        parameters:
          initial_value: {type: number}
          monthly_contribution: {type: number, default: 0}
          annual_return_rate: {type: number, description: "e.g., 0.07 for 7%"}
          years: {type: integer, minimum: 1, maximum: 50}
          inflation_rate: {type: number, default: 0.03}
        returns:
          type: object
          properties:
            future_value_nominal: {type: number}
            future_value_real: {type: number, description: "Inflation-adjusted"}
            total_contributions: {type: number}
            total_growth: {type: number}
            year_by_year: {type: array}

  # ---------------------------------------------------------------------------
  - id: MCP-005
    name: search-mcp
    display_name: "Web Search Server"
    path: src/finapp/mcp_servers/search_server.py
    description: >
      Provides web search capability for market research agent.
      Uses Brave Search API. Scoped to financial/investment content.

    external_providers:
      primary:
        name: Brave Search API
        api_key_env: BRAVE_SEARCH_API_KEY
        rate_limit: "2000 queries/month (free tier)"

    tools:
      - name: web_search
        description: Search the web for financial information
        parameters:
          query:
            type: string
            description: Search query
          max_results:
            type: integer
            default: 5
            maximum: 10
          date_range:
            type: string
            enum: ["day", "week", "month", "year", "all"]
            default: "month"
        returns:
          type: array
          items:
            properties:
              title: {type: string}
              url: {type: string}
              description: {type: string}
              published_date: {type: string, nullable: true}

  # ---------------------------------------------------------------------------
  - id: MCP-006
    name: export-mcp
    display_name: "Report Export Server"
    path: src/finapp/mcp_servers/export_server.py
    description: >
      Generates formatted reports and exports data to PDF and CSV formats.

    tools:
      - name: export_portfolio_csv
        description: Export portfolio holdings to CSV
        parameters:
          portfolio_data: {type: object}
          output_path: {type: string, nullable: true}
        returns:
          type: object
          properties:
            file_path: {type: string}
            row_count: {type: integer}

      - name: generate_performance_report
        description: Generate a PDF performance report for a given period
        parameters:
          portfolio_data: {type: object}
          performance_data: {type: object}
          period: {type: string}
          output_path: {type: string, nullable: true}
        returns:
          type: object
          properties:
            file_path: {type: string}
            pages: {type: integer}
